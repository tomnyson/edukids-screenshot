name: Build Windows

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  workflow_dispatch:   # allow manual trigger from Actions UI

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    defaults:
      run:
        working-directory: app-tauri

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-tauri/package-lock.json

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app-tauri/src-tauri -> target

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm install

      # ── Setup FFmpeg Sidecar ─────────────────────────────────────────────────
      - name: Download FFmpeg (Windows)
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o ffmpeg-release.zip "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          7z x ffmpeg-release.zip
          # The extracted folder is something like ffmpeg-7.0.1-essentials_build/bin/ffmpeg.exe
          cp ffmpeg-*-essentials_build/bin/ffmpeg.exe src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
        shell: bash

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build Tauri app (Windows)
        run: npm run build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''   # leave empty for unsigned dev builds

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - name: Upload Windows installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: edukids-screenshot-windows-setup
          path: |
            app-tauri/src-tauri/target/release/bundle/nsis/*.exe
            app-tauri/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 14

      # ── Publish Release ──────────────────────────────────────────────────────
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-tauri/src-tauri/target/release/bundle/nsis/*.exe
            app-tauri/src-tauri/target/release/bundle/msi/*.msi
          draft: false
          generate_release_notes: true
