name: Build Windows

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  workflow_dispatch:   # allow manual trigger from Actions UI

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    defaults:
      run:
        working-directory: app-tauri

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: app-tauri/yarn.lock

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app-tauri/src-tauri -> target

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build Tauri app (Windows)
        run: yarn build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''   # leave empty for unsigned dev builds

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - name: Upload Windows installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: edukids-screenshot-windows-setup
          path: |
            app-tauri/src-tauri/target/release/bundle/nsis/*.exe
            app-tauri/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 14
